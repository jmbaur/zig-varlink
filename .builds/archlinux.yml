image: archlinux
packages:
  - zig
  - reuse
sources:
  - https://git.sr.ht/~mainiomano/zig-varlink
tasks:
  - build: |
      cd zig-varlink
      zig build
  - test: |
      cd zig-varlink
      zig build test
  - fmt: |
      cd zig-varlink
      zig fmt --check tokenizer.zig
      zig fmt --check scanner.zig
      zig fmt --check json.zig
      zig fmt --check router.zig
      zig fmt --check handler.zig
      zig fmt --check client.zig
      zig fmt --check build.zig
      zig fmt --check test/
  - licenses: |
      cd zig-varlink
      reuse lint
