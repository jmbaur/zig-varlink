image: archlinux
packages:
  - zig
  - python
  - reuse
sources:
  - https://git.sr.ht/~mainiomano/zig-varlink
  - https://github.com/varlink/python.git
tasks:
  - build: |
      cd zig-varlink
      zig build
  - test: |
      cd zig-varlink
      zig build test
  - test_certification_server: |
      cd zig-varlink
      ./zig-out/bin/zig-varlink-certification &
      cd ../python
      PYTHONPATH=. python varlink/tests/test_certification.py --client --varlink=tcp:127.0.0.1:23456
      wait %%
  - test_certification_client: |
      cd python
      PYTHONPATH=. python varlink/tests/test_certification.py --varlink=tcp:127.0.0.1:23456 &
      cd ../zig-varlink
      # Wait for the server to start up
      sleep 0.5
      ./zig-out/bin/zig-varlink-certification --client
      kill %%
  - fmt: |
      cd zig-varlink
      zig fmt --check tokenizer.zig
      zig fmt --check scanner.zig
      zig fmt --check json.zig
      zig fmt --check router.zig
      zig fmt --check handler.zig
      zig fmt --check client.zig
      zig fmt --check build.zig
      zig fmt --check test/
  - licenses: |
      cd zig-varlink
      reuse lint
