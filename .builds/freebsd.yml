image: freebsd/latest
packages:
  - python3
sources:
  - https://git.sr.ht/~mainiomano/zig-varlink
  - https://github.com/varlink/python.git
tasks:
  - install_deps: |
      curl -sS https://ziglang.org/download/0.15.2/zig-x86_64-freebsd-0.15.2.tar.xz | tar -x
      sudo mv zig-x86_64-freebsd-0.15.2/zig /usr/bin/
      sudo mv zig-x86_64-freebsd-0.15.2/lib /usr/lib/zig
  - build: |
      cd zig-varlink
      zig build
  - test: |
      cd zig-varlink
      zig build test
  - test_certification_server: |
      cd zig-varlink
      ./zig-out/bin/zig-varlink-certification &
      cd ../python
      PYTHONPATH=. python3 varlink/tests/test_certification.py --client --varlink=tcp:127.0.0.1:23456
      wait %%
  - test_certification_client: |
      cd python
      PYTHONPATH=. python3 varlink/tests/test_certification.py --varlink=tcp:127.0.0.1:23456 &
      cd ../zig-varlink
      # Wait for the server to start up
      sleep 0.5
      ./zig-out/bin/zig-varlink-certification --client
      kill %%
